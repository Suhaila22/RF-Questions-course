<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RF Electrical Concepts — Quiz</title>
<style>
  :root{
    --navy:#0B1F33; --teal:#0E7E76; --teal2:#17B3A6; --amber:#B07206; --amber2:#F2A40C;
    --slate:#5A6B78; --ink:#14242F; --light:#EEF5F7; --amberfill:#FBF1DC; --line:#D9E2E6;
    --good:#1E7D4F; --goodbg:#E7F4ED; --bad:#9A3324; --badbg:#F7EAE7; --paper:#FFFFFF;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);background:linear-gradient(160deg,#0B1F33 0%,#0B1F33 38%,#0f2840 100%);min-height:100vh;
    -webkit-font-smoothing:antialiased;padding:0 16px 60px}
  .wrap{max-width:820px;margin:0 auto}
  header{padding:34px 0 22px;display:flex;align-items:center;gap:16px}
  .rings{flex:0 0 auto}
  h1{font-family:Cambria,Georgia,"Times New Roman",serif;color:#fff;font-size:30px;margin:0;font-weight:700;letter-spacing:.2px}
  .sub{color:#9FB2C0;font-size:14.5px;margin-top:4px}
  .brand{color:var(--teal2);font-weight:700;letter-spacing:2px;font-size:12px}
  .card{background:var(--paper);border-radius:16px;box-shadow:0 18px 50px rgba(0,0,0,.28);padding:30px 30px 26px;border:1px solid rgba(255,255,255,.06)}
  /* progress */
  .ptop{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .pcount{font-size:13px;color:var(--slate);font-weight:600}
  .chip{display:inline-block;background:var(--light);color:var(--teal);font-size:11.5px;font-weight:700;
    padding:5px 11px;border-radius:20px;letter-spacing:.4px;text-transform:uppercase}
  .bar{height:7px;background:var(--line);border-radius:6px;overflow:hidden;margin-bottom:24px}
  .fill{height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--teal2));transition:width .35s ease}
  /* question */
  .qtext{font-family:Cambria,Georgia,serif;font-size:21px;line-height:1.4;color:var(--navy);font-weight:700;margin:4px 0 20px}
  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;align-items:flex-start;gap:13px;text-align:left;width:100%;cursor:pointer;
    background:#fff;border:1.6px solid var(--line);border-radius:11px;padding:14px 16px;font-size:15.5px;color:var(--ink);
    transition:border-color .15s,background .15s,box-shadow .15s;font-family:inherit;line-height:1.4}
  .opt:hover:not(:disabled){border-color:var(--teal);box-shadow:0 3px 12px rgba(14,126,118,.10)}
  .opt:disabled{cursor:default}
  .key{flex:0 0 auto;width:27px;height:27px;border-radius:7px;background:var(--navy);color:#fff;font-weight:700;
    font-size:14px;display:flex;align-items:center;justify-content:center;margin-top:-1px}
  .opt.correct{border-color:var(--good);background:var(--goodbg)}
  .opt.correct .key{background:var(--good)}
  .opt.wrong{border-color:var(--bad);background:var(--badbg)}
  .opt.wrong .key{background:var(--bad)}
  .opt.dim{opacity:.62}
  .mark{margin-left:auto;font-weight:700;font-size:18px;align-self:center}
  /* explanation */
  .exp{margin-top:18px;border-left:4px solid var(--amber);background:var(--amberfill);border-radius:0 10px 10px 0;
    padding:13px 16px;font-size:14.5px;line-height:1.55;color:var(--ink);display:none}
  .exp.show{display:block}
  .exp b{color:var(--amber)}
  /* nav */
  .nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
  .scoreline{font-size:13.5px;color:var(--slate);font-weight:600}
  button.btn{font-family:inherit;cursor:pointer;border:none;border-radius:10px;padding:12px 24px;font-size:15px;font-weight:700;
    background:var(--teal);color:#fff;transition:background .15s,transform .05s}
  button.btn:hover{background:#0c6f68}
  button.btn:active{transform:translateY(1px)}
  button.btn:disabled{background:#b9c6cd;cursor:default}
  button.ghost{background:transparent;color:var(--teal);border:1.6px solid var(--teal)}
  button.ghost:hover{background:var(--light)}
  /* start + results */
  .center{text-align:center}
  .lead{font-size:16px;line-height:1.6;color:var(--ink);margin:14px 0 8px}
  .meta{color:var(--slate);font-size:14px;margin:18px 0 26px}
  .big{font-family:Cambria,Georgia,serif;font-size:58px;font-weight:700;color:var(--navy);line-height:1}
  .pct{font-size:17px;color:var(--slate);margin-top:6px}
  .msg{font-size:17px;font-weight:700;margin:18px 0 4px}
  .review{margin-top:26px;text-align:left}
  .rv{border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-bottom:11px}
  .rv .rq{font-weight:700;color:var(--navy);font-size:15px;margin-bottom:7px;font-family:Cambria,Georgia,serif}
  .rv .ra{font-size:14px;margin:3px 0;display:flex;gap:7px}
  .rv .ra .lbl{flex:0 0 92px;color:var(--slate);font-weight:600}
  .ok{color:var(--good);font-weight:700}
  .no{color:var(--bad);font-weight:700}
  .rv .re{font-size:13.5px;color:var(--slate);margin-top:6px;line-height:1.5;border-top:1px dashed var(--line);padding-top:7px}
  footer{color:#6f8090;font-size:12.5px;text-align:center;margin-top:24px}
  @media(max-width:560px){.card{padding:22px 18px}h1{font-size:24px}.qtext{font-size:19px}.big{font-size:48px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <svg class="rings" width="58" height="58" viewBox="0 0 58 58" aria-hidden="true">
      <circle cx="29" cy="29" r="26" fill="none" stroke="#17B3A6" stroke-width="1.4" opacity=".55"/>
      <circle cx="29" cy="29" r="18" fill="none" stroke="#17B3A6" stroke-width="1.4" opacity=".75"/>
      <circle cx="29" cy="29" r="10" fill="none" stroke="#17B3A6" stroke-width="1.4"/>
      <circle cx="29" cy="29" r="3.2" fill="#17B3A6"/>
    </svg>
    <div>
      <div class="brand">ISKILLS · RF SYSTEMS</div>
      <h1>RF Electrical Concepts — Quiz</h1>
      <div class="sub">Multiple choice · instant feedback · based on <i>The Electrical Foundations of RF Systems</i></div>
    </div>
  </header>

  <div class="card" id="card"><!-- screens injected here --></div>
  <footer>iSkills · www.iskills.co — sources mapped to Hickman, <i>Practical RF Handbook</i> (4th ed.)</footer>
</div>

<script>
const QUESTIONS = [
  {p:"Why RF is different", q:"At RF, a conductor whose length is comparable to the signal's wavelength must be treated as…",
   o:["a simple, instantaneous node","a transmission line that carries a wave","a pure resistor","a perfect open circuit"],
   a:1, e:"Once length approaches the wavelength, voltage and current vary along the conductor — it behaves as a transmission line, not a lumped node. This is the defining shift from low-frequency circuits."},
  {p:"Why RF is different", q:"The skin effect at high frequency causes current to…",
   o:["spread evenly across the conductor","flow only in the exact centre","crowd into the surface, raising AC resistance","stop flowing altogether"],
   a:2, e:"Current density falls exponentially with depth, so at RF it 'skins' onto the outer surface — which is why conductors are often silver-plated, tubular, or litz wire, and why feeder loss rises with frequency."},
  {p:"Why RF is different", q:"Above its self-resonant frequency (SRF), a real capacitor…",
   o:["keeps acting more capacitive","looks inductive","becomes a perfect short","has zero impedance"],
   a:1, e:"A real capacitor has series lead inductance (ESL). Above the SRF the inductance dominates, so the part 'looks inductive' — pick components whose SRF is well above your operating frequency."},

  {p:"Impedance & the decibel", q:"In Z = R + jX, the term X represents…",
   o:["resistance (energy dissipated)","reactance (energy stored in L and C)","conductance","characteristic impedance"],
   a:1, e:"R dissipates energy; the reactance X stores and returns it in inductors and capacitors. Together they form the complex impedance Z."},
  {p:"Impedance & the decibel", q:"A gain of +10 dB corresponds to a power ratio of…",
   o:["×2","×10","×20","×100"],
   a:1, e:"dB = 10·log10(P2/P1), so +10 dB = ×10 in power. (+3 dB ≈ ×2, +20 dB = ×100.)"},
  {p:"Impedance & the decibel", q:"0 dBm is equal to…",
   o:["1 microwatt","1 milliwatt","1 watt","0 watts"],
   a:1, e:"dBm is power referenced to 1 mW, so 0 dBm = 1 mW. (+30 dBm = 1 W; −100 dBm is a typical weak received signal.)"},
  {p:"Impedance & the decibel", q:"Engineers express gains and losses in decibels mainly because…",
   o:["they look more scientific","they add along a chain instead of multiplying","they avoid using power altogether","they remove the need for impedance"],
   a:1, e:"Gains and losses multiply as ratios; in dB they simply add, turning a whole RF chain into easy arithmetic — the basis of the link budget."},
  {p:"Impedance & the decibel", q:"As frequency rises, the reactance of an inductor (X_L = 2πfL)…",
   o:["increases","decreases","stays constant","becomes negative"],
   a:0, e:"Inductive reactance rises with frequency, while capacitive reactance (X_C = 1/2πfC) falls — they meet at resonance."},

  {p:"Resonance & Q", q:"At resonance in an LC circuit…",
   o:["the inductive and capacitive reactances cancel","resistance becomes zero","the capacitor is removed from the circuit","no current can flow"],
   a:0, e:"At f0 the equal and opposite reactances of L and C cancel, leaving the circuit purely resistive and maximally selective."},
  {p:"Resonance & Q", q:"A tuned circuit with a higher Q has…",
   o:["a wider bandwidth","a narrower bandwidth","a lower resonant frequency","more loss"],
   a:1, e:"Bandwidth follows from Q as BW = f0/Q, so higher Q means a narrower, sharper, more selective response."},
  {p:"Resonance & Q", q:"The resonant frequency of an LC circuit is…",
   o:["f0 = 2π·LC","f0 = 1 / (2π·sqrt(LC))","f0 = LC / 2π","f0 = sqrt(LC) / 2π"],
   a:1, e:"f0 = 1/(2π·√(LC)) — increasing either L or C lowers the resonant frequency."},
  {p:"Resonance & Q", q:"Choosing a component whose self-resonant frequency is well above the operating frequency ensures it…",
   o:["behaves as the element you intended","has zero resistance","never stores energy","cannot resonate at all"],
   a:0, e:"Below its SRF a capacitor stays capacitive and an inductor stays inductive — so the part does the job you designed it for."},

  {p:"Transmission lines", q:"The characteristic impedance Z₀ of a transmission line is determined by…",
   o:["its physical length","its geometry / per-unit L and C (Z₀ = sqrt(L/C))","the source voltage","the operating temperature"],
   a:1, e:"Z₀ = √(L/C) is set by the line's cross-section and materials — not by how long it is. A 50 Ω cable is 50 Ω at any length."},
  {p:"Transmission lines", q:"The most common characteristic impedance in RF systems is…",
   o:["8 Ω","50 Ω","300 Ω","1 kΩ"],
   a:1, e:"50 Ω is the practical compromise between low loss and high power handling adopted as the RF standard (75 Ω is common in video/CATV)."},
  {p:"Transmission lines", q:"A reflection is created on a line when…",
   o:["the line is too short","the load impedance differs from the line's Z₀","the frequency is too low","the source is switched off"],
   a:1, e:"Energy reflects whenever the load is not matched to Z₀. A matched load (ZL = Z₀) absorbs all the incident power, so nothing bounces back."},
  {p:"Transmission lines", q:"For a perfectly matched load, the reflection coefficient Γ is…",
   o:["0","0.5","1","infinite"],
   a:0, e:"Γ = (ZL − Z₀)/(ZL + Z₀). When ZL = Z₀ the numerator is zero, so Γ = 0 — no reflected wave."},

  {p:"VSWR, matching & Smith", q:"A VSWR of 1:1 means…",
   o:["total reflection","a perfect match with no reflected power","half the power is reflected","an open circuit"],
   a:1, e:"VSWR = (1+|Γ|)/(1−|Γ|). With Γ = 0 the ratio is 1:1 — a flat line and a perfect match."},
  {p:"VSWR, matching & Smith", q:"A larger return loss (in dB) indicates…",
   o:["more reflected power","less reflected power / a better match","higher VSWR","a longer cable"],
   a:1, e:"Return loss = −20·log10|Γ|, so a bigger number means less is reflected — a better match. (20 dB return loss ≈ 1% of power reflected.)"},
  {p:"VSWR, matching & Smith", q:"The centre of the Smith chart represents…",
   o:["an open circuit","a perfect match (Γ = 0, Z₀)","a short circuit","total reflection"],
   a:1, e:"The Smith chart plots Γ on the reflection plane; its centre is Γ = 0 — the system impedance and a perfect match. The rim is |Γ| = 1, total reflection."},
  {p:"VSWR, matching & Smith", q:"The job of an impedance-matching network is to…",
   o:["increase the transmit power","transform a load toward the system impedance to minimise reflection","add noise to the signal","lower the operating frequency"],
   a:1, e:"Matching transforms the load to Z₀ so reflections are minimised and power transfer is maximised — usually with reactive L-, Pi-, or T-networks."},
  {p:"VSWR, matching & Smith", q:"In S-parameters, S₂₁ describes…",
   o:["input reflection","forward transmission (gain or insertion loss)","output reflection","DC resistance"],
   a:1, e:"S₂₁ is the forward transmission from port 1 to port 2 (a device's gain or loss). S₁₁ is the input reflection — closely related to VSWR."},

  {p:"Active RF", q:"A Class C amplifier conducts for…",
   o:["the full 360° of the cycle","exactly 180°","less than 180° (high efficiency, nonlinear)","more than 360°"],
   a:2, e:"Conduction angle sets the class: A = 360° (linear, low efficiency), B = 180°, C < 180° (high efficiency but nonlinear — used for tuned PAs)."},
  {p:"Active RF", q:"In a receiver chain, the overall noise figure is dominated by…",
   o:["the last stage","the first stage (the LNA)","the power supply","the antenna feeder only"],
   a:1, e:"By Friis' formula, the first stage's noise figure dominates because later stages' noise is divided by the earlier gain — which is why the LNA comes first and must be quiet."},
  {p:"Active RF", q:"The Barkhausen criterion for a stable oscillator requires loop gain ≥ 1 and a total phase shift of…",
   o:["90°","180°","0° (or 360°)","45°"],
   a:2, e:"For sustained oscillation the feedback must return in phase (0° / 360°) with a loop gain of at least unity — gain plus the right phase makes a carrier."},
  {p:"Active RF", q:"A mixer can create new sum and difference frequencies because it is…",
   o:["a perfectly linear device","a nonlinear device","a high-Q filter","a matched load"],
   a:1, e:"Only a nonlinear device generates new frequencies (f1 ± f2). A linear element just scales the inputs — this nonlinear mixing is the heart of the superheterodyne."},
  {p:"Active RF", q:"Thermal (Johnson) noise power is given by…",
   o:["N = kTB","N = IV","N = V²/R","N = Q·f0"],
   a:0, e:"N = kTB (Boltzmann's constant × temperature × bandwidth) sets the noise floor a receiver must work above; widening the bandwidth raises the noise."},

  {p:"Signals & the link", q:"An AM signal occupies a bandwidth of approximately…",
   o:["fm (the message frequency)","2 × fm","fc (the carrier frequency)","half of fm"],
   a:1, e:"AM places sidebands at fc ± fm, so the occupied bandwidth is twice the highest message frequency, 2·fm."},
  {p:"Signals & the link", q:"A band-pass filter…",
   o:["passes only low frequencies","passes a band and rejects frequencies above and below it","blocks one narrow frequency","passes everything equally"],
   a:1, e:"A band-pass filter (often a tuned/resonant circuit) passes a chosen band and attenuates everything outside it — the selectivity of every receiver."},
  {p:"Signals & the link", q:"Free-space path loss increases by about 6 dB when…",
   o:["the power is halved","the distance or the frequency doubles","the antenna gain doubles","the bandwidth doubles"],
   a:1, e:"FSPL = 20·log10(d) + 20·log10(f) + 32.45, so doubling either distance or frequency adds ~6 dB — the inverse-square law in decibels."},
  {p:"Signals & the link", q:"The link margin is…",
   o:["transmit power minus antenna gain","received level minus receiver sensitivity","path loss minus transmit power","noise floor minus carrier"],
   a:1, e:"Margin = received level − receiver sensitivity. It must stay comfortably positive for a reliable link; it is the single number a link budget produces."},
];

const card = document.getElementById('card');
let idx=0, score=0;
const chosen = new Array(QUESTIONS.length).fill(null);

function start(){
  card.innerHTML = `
    <div class="center">
      <div class="lead">A ${QUESTIONS.length}-question multiple-choice quiz across the seven parts of the electrical-concepts deck —
      impedance, resonance, transmission lines, matching, active RF, and the link.</div>
      <div class="meta">Pick an answer to see whether you're right and why. Your score builds as you go.<br>
      Pass mark suggestion: 70% (${Math.ceil(QUESTIONS.length*0.7)}/${QUESTIONS.length}).</div>
      <button class="btn" onclick="render()">Start the quiz</button>
    </div>`;
}

function render(){
  const Q = QUESTIONS[idx];
  const picked = chosen[idx];
  const answered = picked !== null;
  const pct = Math.round((idx)/QUESTIONS.length*100);
  let opts = Q.o.map((t,i)=>{
    let cls="opt";
    if(answered){
      cls+=" dim";
      if(i===Q.a) cls="opt correct";
      else if(i===picked) cls="opt wrong";
    }
    const mark = answered && i===Q.a ? '<span class="mark ok">✓</span>'
               : (answered && i===picked ? '<span class="mark no">✕</span>' : '');
    return `<button class="${cls}" ${answered?'disabled':''} onclick="pick(${i})">
        <span class="key">${"ABCD"[i]}</span><span>${t}</span>${mark}</button>`;
  }).join("");
  card.innerHTML = `
    <div class="ptop"><span class="chip">${Q.p}</span><span class="pcount">Question ${idx+1} of ${QUESTIONS.length}</span></div>
    <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
    <div class="qtext">${Q.q}</div>
    <div class="opts">${opts}</div>
    <div class="exp ${answered?'show':''}" id="exp"><b>${picked===Q.a?'Correct.':'Not quite.'}</b> ${Q.e}</div>
    <div class="nav">
      <span class="scoreline">Score: ${score} / ${QUESTIONS.length}</span>
      <button class="btn" id="nextb" ${answered?'':'disabled'} onclick="next()">${idx===QUESTIONS.length-1?'See results':'Next question'}</button>
    </div>`;
}

function pick(i){
  if(chosen[idx]!==null) return;
  chosen[idx]=i;
  if(i===QUESTIONS[idx].a) score++;
  render();
}
function next(){ if(chosen[idx]===null) return; if(idx<QUESTIONS.length-1){idx++; render();} else results(); }

function results(){
  const pct = Math.round(score/QUESTIONS.length*100);
  let msg, col;
  if(pct>=90){msg="Outstanding — you own this material.";col="var(--good)";}
  else if(pct>=70){msg="Solid pass. A few to polish.";col="var(--teal)";}
  else if(pct>=50){msg="Getting there — review the weak areas.";col="var(--amber)";}
  else {msg="Worth another pass through the deck.";col="var(--bad)";}
  const review = QUESTIONS.map((Q,n)=>{
    const yi=chosen[n], correct=yi===Q.a;
    return `<div class="rv">
      <div class="rq">Q${n+1}. ${Q.q}</div>
      <div class="ra"><span class="lbl">Your answer</span><span class="${correct?'ok':'no'}">${"ABCD"[yi]} — ${Q.o[yi]} ${correct?'✓':'✕'}</span></div>
      ${correct?'':`<div class="ra"><span class="lbl">Correct</span><span class="ok">${"ABCD"[Q.a]} — ${Q.o[Q.a]}</span></div>`}
      <div class="re">${Q.e}</div></div>`;
  }).join("");
  card.innerHTML = `
    <div class="center">
      <div class="big" style="color:${col}">${score}/${QUESTIONS.length}</div>
      <div class="pct">${pct}%</div>
      <div class="bar" style="max-width:340px;margin:18px auto 0"><div class="fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="msg" style="color:${col}">${msg}</div>
      <button class="btn" style="margin-top:18px" onclick="restart()">Restart quiz</button>
    </div>
    <div class="review"><h3 style="font-family:Cambria,Georgia,serif;color:var(--navy)">Review &amp; explanations</h3>${review}</div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}
function restart(){ idx=0; score=0; chosen.fill(null); start(); window.scrollTo({top:0,behavior:'smooth'}); }

start();
</script>
</body>
</html>
